name: dominans-audit

# Monthly, model-free distribution + competition watch for Browser MCP by Agent360.
# Runs entirely on GitHub's infrastructure (no AI vendor, no machine to keep awake).
# scripts/dominans-audit.py exits non-zero on any 🔴 finding (registry drift, catalog
# regression, or the dead twin browsermcp.io resurrecting) — a failed run emails the
# repo owner. The full report is written to the run's job summary either way.
#
# Manual run any time from the Actions tab (workflow_dispatch).

on:
  schedule:
    - cron: "0 7 1 * *"   # 1st of each month, 07:00 UTC = 09:00 Europe/Copenhagen
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run dominans-audit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/dominans-audit.py
